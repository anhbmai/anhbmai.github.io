<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anh Mai's Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #e8b8c2, #efe9c9);
  text-align: center;
}

/* HEADER */
.header {
  background: #f5f5f5;
  padding: 40px 20px 20px;
}

.header h1 {
  margin: 0;
  font-size: 48px;
  letter-spacing: 4px;
}

/* NAV */
.nav {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 40px;
  align-items: center;
  font-size: 18px;
  letter-spacing: 2px;
}

/* NAV LINKS */
.nav a {
  text-decoration: none;
  color: #444;
}

.nav a:hover {
  text-decoration: underline;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
  max-width: 1100px;
  margin: 40px auto;
}

.item img {
  width: 100%;
  max-width: 340px;
}

.title {
  margin-top: 15px;
  font-family: Georgia, serif;
  font-size: 28px;
  font-weight: bold;
}

.middle-column {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

@media (max-width: 900px) {
  .gallery {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>ANH MAI'S PORTFOLIO</h1>

  <!-- CLEAN NAV -->
  <div class="nav">
    <a href="index.html">HOME</a>

  </div>
</div>

<div class="gallery">

  <div class="item">
    <a href="glitch.html">
      <img src="glitch.JPG">
      <div class="title">GLITCH ART</div>
    </a>
  </div>


  <!-- MIDDLE -->
  <div class="middle-column">

    <div class="item">
      <a href="meme.html">
        <img src="mememashup.jpg">

    </div>

    </div>

  <div class="item">
